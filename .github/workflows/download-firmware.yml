on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  download-firmware:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch all released firmware versions from qidimaker.com
        run: |
          RESPONSE=$(curl -sf -X POST \
            -H "Content-Type: application/json" \
            -d '{"hardwareModel":"QD_Q2","operatingSystem":"3DPrinter","isReleased":true,"pageNum":1,"pageSize":20}' \
            https://www.qidimaker.com/backend/v1/fireware/version/released)

          if [ -z "$RESPONSE" ]; then
            echo "Failed to fetch firmware list from qidimaker.com"
            exit 1
          fi

          echo "FIRMWARE_LIST=$RESPONSE" >> $GITHUB_ENV

      - name: Process and release new firmware versions
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "$FIRMWARE_LIST" | python3 - << 'PYEOF'
          import json, os, subprocess, sys, urllib.request, tempfile

          data = json.loads(os.environ["FIRMWARE_LIST"])

          # Adjust this path based on actual API response shape
          records = data.get("data", {}).get("records", []) or data.get("data", []) or []

          if not records:
              print("No firmware records found in response")
              print("Raw response:", json.dumps(data, indent=2))
              sys.exit(1)

          for record in records:
              version = record.get("versionCode") or record.get("version") or record.get("versionName")
              download_url = record.get("downloadUrl") or record.get("fileUrl") or record.get("url")
              description = (
                  record.get("description", {}).get("en_US")
                  or record.get("desc")
                  or "Firmware update for QIDI Q2"
              )

              if not version or not download_url:
                  print(f"Skipping record missing version or URL: {record}")
                  continue

              print(f"=== Checking {version} ===")

              # Check if release already exists
              result = subprocess.run(
                  ["gh", "release", "view", version],
                  capture_output=True
              )
              if result.returncode == 0:
                  print(f"Release {version} already exists — skipping")
                  continue

              # Download firmware
              print(f"Downloading {version} from {download_url}")
              firmware_file = f"firmware_{version}.zip"
              try:
                  urllib.request.urlretrieve(download_url, firmware_file)
              except Exception as e:
                  print(f"Failed to download {version}: {e}")
                  continue

              if not os.path.exists(firmware_file) or os.path.getsize(firmware_file) == 0:
                  print(f"Downloaded file is empty for {version}")
                  continue

              # Create release
              notes = (
                  f"{description}\n\n"
                  "---\n\n"
                  "**Note:** The firmware.zip file is the property of QIDI Tech. "
                  "Copyright © QIDI Tech All Rights Reserved.\n\n"
                  "This repository only automates the distribution of official firmware releases."
              )

              result = subprocess.run(
                  ["gh", "release", "create", version, firmware_file,
                   "--title", f"Firmware {version}",
                   "--notes", notes],
                  capture_output=True, text=True
              )
              if result.returncode == 0:
                  print(f"Release {version} created successfully")
              else:
                  print(f"Failed to create release {version}: {result.stderr}")

              os.remove(firmware_file)

          PYEOF
