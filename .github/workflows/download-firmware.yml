jobs:
  download-firmware:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch released firmware versions from qidimaker.com
        run: |
          RESPONSE=$(curl -sf -X POST \
            -H "Content-Type: application/json" \
            -H "Accept: application/json" \
            -d '{"hardwareModel":"QD_Q2","operatingSystem":"3DPrinter","isReleased":true,"pageNum":1,"pageSize":20}' \
            https://www.qidimaker.com/backend/v1/fireware/version/released)

          if [ -z "$RESPONSE" ]; then
            echo "Failed to fetch firmware list from qidimaker.com"
            exit 1
          fi

          echo "FIRMWARE_LIST=$RESPONSE" >> $GITHUB_ENV

      - name: Create releases for new firmware versions
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 << 'PYEOF'
          import json, os, subprocess, sys, urllib.request

          data = json.loads(os.environ["FIRMWARE_LIST"])
          records = data.get("data", {}).get("records", [])

          if not records:
              print("No firmware records found")
              sys.exit(1)

          for record in records:
              version    = record["versionCode"]
              file_url   = record["fileUrl"]
              content    = record.get("content", "")

              print(f"=== Checking V{version} ===")

              tag = f"V{version}"

              # Skip if release already exists
              result = subprocess.run(["gh", "release", "view", tag], capture_output=True)
              if result.returncode == 0:
                  print(f"Release {tag} already exists — skipping")
                  continue

              # Download firmware
              print(f"Downloading {tag} from {file_url}")
              firmware_file = f"firmware_{version}.zip"
              try:
                  urllib.request.urlretrieve(file_url, firmware_file)
              except Exception as e:
                  print(f"Failed to download {tag}: {e}")
                  continue

              if not os.path.exists(firmware_file) or os.path.getsize(firmware_file) == 0:
                  print(f"Downloaded file is empty for {tag} — skipping")
                  continue

              notes = (
                  f"{content}\n\n"
                  "---\n\n"
                  "**Note:** The firmware.zip file is the property of QIDI Tech. "
                  "Copyright © QIDI Tech All Rights Reserved.\n\n"
                  "This repository only automates the distribution of official firmware releases."
              )

              result = subprocess.run(
                  ["gh", "release", "create", tag, firmware_file,
                   "--title", f"Firmware {tag}",
                   "--notes", notes],
                  capture_output=True, text=True
              )

              if result.returncode == 0:
                  print(f"Release {tag} created successfully")
              else:
                  print(f"Failed to create release {tag}: {result.stderr}")

              os.remove(firmware_file)

          PYEOF
