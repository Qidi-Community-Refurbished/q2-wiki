name: Backfill Firmware Releases

on:
  workflow_dispatch:

jobs:
  backfill:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Backfill known firmware versions
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Known Q2 firmware versions to attempt, oldest to newest
          VERSIONS=(
            "V1.0.9"
            "V1.1.0"
            "V1.1.1"
            "V01.01.02.01"
            "V01.01.02.02"
            "V01.01.02.03"
          )

          for VERSION in "${VERSIONS[@]}"; do
            echo "=== Checking $VERSION ==="

            # Skip if release already exists in this repo
            if gh release view "$VERSION" >/dev/null 2>&1; then
              echo "Release $VERSION already exists — skipping"
              continue
            fi

            DOWNLOADED=false
            FIRMWARE_FILE="firmware_${VERSION}.zip"

            # Strategy 1: Try QIDITECH's official GitHub release assets
            echo "Trying QIDITECH/QIDI_Q2 GitHub release for $VERSION..."
            ASSET_URL=$(gh release view "$VERSION" \
              --repo QIDITECH/QIDI_Q2 \
              --json assets \
              --jq '.assets[] | select(.name | startswith("Q2")) | .url' 2>/dev/null | head -1)

            if [ -n "$ASSET_URL" ]; then
              echo "Found asset at $ASSET_URL"
              if wget -q "$ASSET_URL" -O "$FIRMWARE_FILE" && [ -s "$FIRMWARE_FILE" ]; then
                echo "Downloaded from QIDITECH GitHub"
                DOWNLOADED=true
              else
                rm -f "$FIRMWARE_FILE"
              fi
            fi

            # Strategy 2: Try qidi-community/q2-wiki GitHub release assets
            if [ "$DOWNLOADED" = "false" ]; then
              echo "Trying qidi-community/q2-wiki GitHub release for $VERSION..."
              ASSET_URL=$(gh release view "$VERSION" \
                --repo qidi-community/q2-wiki \
                --json assets \
                --jq '.assets[] | select(.name | endswith(".zip")) | .url' 2>/dev/null | head -1)

              if [ -n "$ASSET_URL" ]; then
                echo "Found asset at $ASSET_URL"
                if wget -q "$ASSET_URL" -O "$FIRMWARE_FILE" && [ -s "$FIRMWARE_FILE" ]; then
                  echo "Downloaded from qidi-community GitHub"
                  DOWNLOADED=true
                else
                  rm -f "$FIRMWARE_FILE"
                fi
              fi
            fi

            # Strategy 3: Try QIDI's AWS download server
            if [ "$DOWNLOADED" = "false" ]; then
              AWS_URL="https://download_aws.qidi3dprinter.com/QD_Q2/Q2_${VERSION}.zip"
              echo "Trying QIDI AWS: $AWS_URL"
              HTTP_STATUS=$(wget -q --server-response "$AWS_URL" -O "$FIRMWARE_FILE" 2>&1 | grep "HTTP/" | tail -1 | awk '{print $2}')
              if [ "$HTTP_STATUS" = "200" ] && [ -s "$FIRMWARE_FILE" ]; then
                echo "Downloaded from QIDI AWS"
                DOWNLOADED=true
              else
                rm -f "$FIRMWARE_FILE"
              fi
            fi

            if [ "$DOWNLOADED" = "false" ]; then
              echo "Could not download $VERSION from any source — skipping"
              continue
            fi

            # Create the release
            echo "Creating release for $VERSION..."
            gh release create "$VERSION" "$FIRMWARE_FILE" \
              --title "Firmware $VERSION" \
              --notes "$(printf 'Firmware version %s for the QIDI Q2.\n\n---\n\n**Note:** The firmware.zip file is the property of QIDI Tech. Copyright © QIDI Tech All Rights Reserved.\n\nThis repository only automates the distribution of official firmware releases.' "$VERSION")"

            rm -f "$FIRMWARE_FILE"
            echo "Release $VERSION created successfully"
          done

          echo "=== Backfill complete ==="